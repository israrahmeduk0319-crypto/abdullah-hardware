<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdullah Hardware — Tools, Fittings &amp; Building Supplies</title>
<meta name="description" content="Abdullah Hardware — your trusted neighborhood hardware store. Browse tools and supplies, order instantly on WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ABDULLAH HARDWARE — CONFIG
     Edit the values below to customize contact info & products.
     ============================================================ */
</style>
</head>
<body>

<script>
/* =========================================================================
   1) STORE CONFIG — edit phone numbers, address & map link here
   ========================================================================= */
const STORE = {
  name: "Abdullah Hardware",
  tagline: "Tools & Fittings, Done Right",
  phone: "+92 300 1234567",        // set to "" to hide
  whatsapp: "923001234567",         // digits only, country code, no + or spaces. Set to "" to hide the WhatsApp button/section.
  address: "Shop #14, Main Bazaar Road, Lahore, Pakistan", // set to "" to hide
  mapEmbedUrl: "https://www.google.com/maps?q=Lahore,Pakistan&output=embed", // set to "" to hide the map
  about: "For over 15 years, Abdullah Hardware has been the neighborhood's first call for quality tools, fittings, and building supplies. We stock trusted brands, give honest advice, and make sure every job — big or small — has the right part behind it. Walk in, call, or order straight to your door on WhatsApp."
};

/* =========================================================================
   2) PRODUCTS — add, edit, or remove items freely.
      "image" is OPTIONAL — leave it as "" and a tool icon placeholder
      will be shown automatically instead.
   ========================================================================= */
const PRODUCTS = [
  {
    name: "Claw Hammer 16oz",
    price: "Rs. 850",
    description: "Forged steel head, fibreglass shock-absorbing handle.",
    image: "https://placehold.co/400x300/1e2124/f0a500?text=Claw+Hammer"
  },
  {
    name: "Screwdriver Set (6-Piece)",
    price: "Rs. 1,200",
    description: "Magnetic tips, chrome vanadium steel, lifetime grip.",
    image: "https://placehold.co/400x300/1e2124/f0a500?text=Screwdriver+Set"
  },
  {
    name: "Cordless Drill Machine",
    price: "Rs. 8,500",
    description: "12V, 2-speed, includes battery, charger & bit set.",
    image: "https://placehold.co/400x300/1e2124/f0a500?text=Drill+Machine"
  },
  {
    name: "Adjustable Pipe Wrench 14\"",
    price: "Rs. 1,450",
    description: "Heavy-duty cast iron, serrated jaw for firm grip.",
    image: ""
  },
  {
    name: "Weatherproof Emulsion Paint (4L)",
    price: "Rs. 3,300",
    description: "Interior/exterior, washable finish, wide colour range.",
    image: ""
  },
  {
    name: "Assorted Nails Pack (1kg)",
    price: "Rs. 320",
    description: "Mixed sizes, rust-resistant coating.",
    image: ""
  },
  {
    name: "Measuring Tape 5m",
    price: "Rs. 450",
    description: "Steel blade with belt clip and auto-lock.",
    image: "https://placehold.co/400x300/1e2124/f0a500?text=Measuring+Tape"
  },
  {
    name: "Safety Gloves (Pair)",
    price: "Rs. 380",
    description: "",
    image: ""
  }
];
</script>

<div id="app"></div>

<script>
/* =========================================================================
   3) RENDER — you shouldn't need to edit anything below this line.
   ========================================================================= */
const waLink = (msg) => STORE.whatsapp
  ? `https://wa.me/${STORE.whatsapp}?text=${encodeURIComponent(msg)}`
  : "#";

const toolIconSVG = `
<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="placeholder-icon">
  <circle cx="32" cy="32" r="30" fill="#2a2f33"/>
  <path d="M22 14c-4 0-7.3 2.9-8 6.7-.1.7.7 1.2 1.3.8l4.4-3 3 3-3 4.4c-.4.6.1 1.4.8 1.3 3.8-.7 6.7-4 6.7-8 0-.9-.1-1.7-.4-2.5L44 33c1.3-1.3 3.5-1.3 4.8 0l4.6 4.6c1.3 1.3 1.3 3.5 0 4.8l-3.8 3.8c-1.3 1.3-3.5 1.3-4.8 0L40.2 41.6c-1.3-1.3-1.3-3.5 0-4.8l1-1-15.4-15.4c-.8.3-1.7.4-2.6.4a11 11 0 0 1-1.2-.1 6.7 6.7 0 0 0 0-6.7z" fill="#f0a500"/>
  <path d="M12 46l8-8 4 4-8 8a2.8 2.8 0 1 1-4-4z" fill="#f0a500"/>
</svg>`;

function productCard(p) {
  const media = p.image
    ? `<div class="card-media"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>`
    : `<div class="card-media card-media--placeholder">${toolIconSVG}</div>`;
  const desc = p.description ? `<p class="card-desc">${p.description}</p>` : "";
  const orderBtn = STORE.whatsapp
    ? `<a class="btn-order" target="_blank" rel="noopener" href="${waLink(`Hi Abdullah Hardware, I'd like to order: ${p.name} (${p.price})`)}">
         ${waIcon()} Order Now
       </a>`
    : `<span class="btn-order btn-order--disabled">Contact store to order</span>`;

  return `
  <article class="card" data-name="${p.name.toLowerCase()}">
    ${media}
    <div class="card-body">
      <div class="card-top">
        <h3 class="card-name">${p.name}</h3>
        <span class="price-tag">${p.price}</span>
      </div>
      ${desc}
      ${orderBtn}
    </div>
  </article>`;
}

function waIcon(size = 18) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
    <path d="M16.03 3C9.4 3 4 8.36 4 15c0 2.35.68 4.55 1.86 6.42L4 29l7.78-1.82A11.9 11.9 0 0 0 16.03 27C22.66 27 28 21.64 28 15S22.66 3 16.03 3Zm0 21.7c-1.94 0-3.75-.55-5.28-1.5l-.38-.22-4.62 1.08 1.1-4.5-.25-.4A9.62 9.62 0 0 1 6.3 15c0-5.36 4.4-9.7 9.73-9.7 5.34 0 9.67 4.34 9.67 9.7 0 5.36-4.33 9.7-9.67 9.7Zm5.32-7.27c-.29-.15-1.72-.85-1.99-.95-.27-.1-.46-.15-.66.15-.19.29-.75.95-.92 1.14-.17.2-.34.22-.63.07-.29-.15-1.22-.45-2.32-1.43-.86-.76-1.44-1.7-1.6-1.99-.17-.29-.02-.44.13-.59.13-.13.29-.34.44-.51.15-.17.19-.29.29-.49.1-.2.05-.37-.02-.51-.07-.15-.66-1.6-.91-2.19-.24-.58-.48-.5-.66-.51h-.56c-.2 0-.51.07-.78.37-.27.29-1.02 1-1.02 2.44s1.05 2.83 1.19 3.02c.15.2 2.07 3.16 5.02 4.43.7.3 1.25.48 1.68.62.7.22 1.34.19 1.85.12.56-.08 1.72-.7 1.97-1.38.24-.68.24-1.26.17-1.38-.07-.12-.26-.2-.55-.34Z"/>
  </svg>`;
}

const productsHTML = PRODUCTS.map(productCard).join("");

const contactRows = [
  STORE.phone ? { label: "Call Us", value: STORE.phone, href: `tel:${STORE.phone.replace(/\s+/g,"")}` } : null,
  STORE.whatsapp ? { label: "WhatsApp", value: "+" + STORE.whatsapp, href: waLink(`Hi Abdullah Hardware, I have a question.`) } : null,
  STORE.address ? { label: "Visit Us", value: STORE.address, href: null } : null,
].filter(Boolean);

const contactHTML = contactRows.map(r => `
  <div class="contact-row">
    <span class="contact-label">${r.label}</span>
    ${r.href
      ? `<a class="contact-value contact-value--link" href="${r.href}" target="_blank" rel="noopener">${r.value}</a>`
      : `<span class="contact-value">${r.value}</span>`}
  </div>`).join("");

const mapHTML = STORE.mapEmbedUrl
  ? `<div class="map-wrap"><iframe src="${STORE.mapEmbedUrl}" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Store location"></iframe></div>`
  : "";

const floatingWA = STORE.whatsapp ? `
  <a class="fab-whatsapp" href="${waLink('Hi Abdullah Hardware, I would like some help.')}" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">
    ${waIcon(28)}
  </a>` : "";

document.getElementById("app").innerHTML = `
  <header class="site-header">
    <div class="header-inner">
      <a href="#home" class="logo">
        <span class="logo-mark">${toolIconSVG}</span>
        <span class="logo-text">${STORE.name}</span>
      </a>
      <nav class="nav">
        <a href="#products">Products</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
      ${STORE.whatsapp ? `<a class="btn-header-order" target="_blank" rel="noopener" href="${waLink('Hi Abdullah Hardware, I would like to place an order.')}">${waIcon(16)} Order on WhatsApp</a>` : ""}
    </div>
  </header>

  <section class="hero" id="home">
    <div class="hero-inner">
      <p class="eyebrow">Est. — Your Neighborhood Hardware Store</p>
      <h1>${STORE.name}</h1>
      <p class="hero-tagline">${STORE.tagline}</p>
      <div class="hero-actions">
        <a href="#products" class="btn-primary">Browse Products</a>
        ${STORE.whatsapp ? `<a class="btn-secondary" target="_blank" rel="noopener" href="${waLink('Hi Abdullah Hardware, I would like to place an order.')}">${waIcon(18)} Order Now</a>` : ""}
      </div>
    </div>
    <div class="hazard-strip" aria-hidden="true"></div>
  </section>

  <section class="section" id="products">
    <div class="section-inner">
      <div class="section-head">
        <div>
          <p class="eyebrow">The Aisle</p>
          <h2>Products</h2>
        </div>
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="Search products…" aria-label="Search products">
        </div>
      </div>
      <div class="grid" id="productGrid">${productsHTML}</div>
      <p class="no-results" id="noResults" hidden>No products match your search.</p>
    </div>
  </section>

  <section class="section section--dark" id="about">
    <div class="section-inner about-inner">
      <div>
        <p class="eyebrow">Who We Are</p>
        <h2>About Us</h2>
        <p class="about-text">${STORE.about}</p>
      </div>
      <div class="about-stats">
        <div class="stat"><span class="stat-num">15+</span><span class="stat-label">Years Serving Locals</span></div>
        <div class="stat"><span class="stat-num">500+</span><span class="stat-label">Products In Stock</span></div>
        <div class="stat"><span class="stat-num">100%</span><span class="stat-label">Honest Advice</span></div>
      </div>
    </div>
  </section>

  <section class="section" id="contact">
    <div class="section-inner">
      <p class="eyebrow">Get In Touch</p>
      <h2>Contact</h2>
      <div class="contact-grid">
        <div class="contact-info">${contactHTML || `<p class="contact-empty">Contact details coming soon.</p>`}</div>
        ${mapHTML}
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© ${new Date().getFullYear()} ${STORE.name}. All rights reserved.</p>
  </footer>

  ${floatingWA}
`;

/* Live search */
const searchInput = document.getElementById("searchInput");
const grid = document.getElementById("productGrid");
const noResults = document.getElementById("noResults");
searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  let visibleCount = 0;
  grid.querySelectorAll(".card").forEach(card => {
    const match = card.dataset.name.includes(q);
    card.style.display = match ? "" : "none";
    if (match) visibleCount++;
  });
  noResults.hidden = visibleCount !== 0;
});
</script>

<style>
  :root{
    --charcoal: #1e2124;
    --charcoal-soft: #2a2f33;
    --paper: #f2efe7;
    --paper-dim: #e7e2d6;
    --amber: #f0a500;
    --amber-dark: #c98700;
    --rust: #b5502d;
    --steel: #6b7280;
    --ink: #1e2124;
    --radius: 6px;
    --display: "Oswald", sans-serif;
    --body: "Inter", sans-serif;
    --mono: "JetBrains Mono", monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:var(--body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3{font-family:var(--display);text-transform:uppercase;margin:0;}
  .eyebrow{
    font-family:var(--mono);
    font-size:.72rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--amber-dark);
    margin:0 0 .5rem;
  }
  section.section--dark .eyebrow{color:var(--amber);}

  /* ---------- Header ---------- */
  .site-header{
    position:sticky; top:0; z-index:50;
    background:var(--charcoal);
    border-bottom:3px solid var(--amber);
  }
  .header-inner{
    max-width:1160px;margin:0 auto;padding:.85rem 1.5rem;
    display:flex;align-items:center;justify-content:space-between;gap:1.5rem;
  }
  .logo{display:flex;align-items:center;gap:.6rem;}
  .logo-mark{width:34px;height:34px;flex:0 0 auto;}
  .logo-mark svg{width:100%;height:100%;}
  .logo-text{
    font-family:var(--display);color:var(--paper);
    font-size:1.25rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase;
  }
  .nav{display:flex;gap:1.75rem;}
  .nav a{
    color:var(--paper-dim);font-size:.92rem;font-weight:500;
    letter-spacing:.02em;transition:color .15s ease;
  }
  .nav a:hover, .nav a:focus-visible{color:var(--amber);}
  .btn-header-order{
    display:flex;align-items:center;gap:.45rem;
    background:var(--amber);color:var(--charcoal);
    padding:.55rem 1rem;border-radius:var(--radius);
    font-weight:700;font-size:.85rem;white-space:nowrap;
    transition:background .15s ease;
  }
  .btn-header-order:hover, .btn-header-order:focus-visible{background:var(--amber-dark);}

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    background:var(--charcoal);
    color:var(--paper);
    padding:5.5rem 1.5rem 6.5rem;
    background-image:
      radial-gradient(rgba(240,165,0,.16) 1.6px, transparent 1.6px);
    background-size: 26px 26px;
    background-position: -6px -6px;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute;inset:0;
    background:radial-gradient(ellipse at 30% 20%, rgba(30,33,36,0) 0%, var(--charcoal) 72%);
    pointer-events:none;
  }
  .hero-inner{max-width:760px;margin:0 auto;text-align:center;position:relative;z-index:1;}
  .hero h1{
    font-size:clamp(2.6rem, 6vw, 4.4rem);
    line-height:1;letter-spacing:.01em;
    margin:.3rem 0 .6rem;
  }
  .hero-tagline{
    font-size:1.15rem;color:var(--paper-dim);
    margin:0 0 2.2rem;
  }
  .hero-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
  .btn-primary, .btn-secondary{
    padding:.85rem 1.7rem;border-radius:var(--radius);
    font-weight:700;font-size:.95rem;
    display:inline-flex;align-items:center;gap:.5rem;
    transition:transform .12s ease, background .15s ease;
  }
  .btn-primary{background:var(--amber);color:var(--charcoal);}
  .btn-primary:hover, .btn-primary:focus-visible{background:var(--amber-dark);}
  .btn-secondary{background:transparent;color:var(--paper);border:1.5px solid rgba(242,239,231,.4);}
  .btn-secondary:hover, .btn-secondary:focus-visible{border-color:var(--amber);color:var(--amber);}
  .btn-primary:hover,.btn-secondary:hover{transform:translateY(-1px);}

  .hazard-strip{
    position:absolute;left:0;right:0;bottom:0;height:10px;
    background:repeating-linear-gradient(135deg, var(--amber) 0 18px, var(--charcoal) 18px 36px);
  }

  /* ---------- Sections ---------- */
  .section{padding:5rem 1.5rem;}
  .section--dark{background:var(--charcoal);color:var(--paper);}
  .section-inner{max-width:1160px;margin:0 auto;}
  .section-head{
    display:flex;justify-content:space-between;align-items:flex-end;
    gap:1.5rem;flex-wrap:wrap;margin-bottom:2.5rem;
  }
  .section h2{font-size:2.2rem;}

  /* ---------- Search ---------- */
  .search-wrap{flex:0 0 auto;width:100%;max-width:320px;}
  #searchInput{
    width:100%;padding:.7rem 1rem;
    border:1.5px solid var(--steel);border-radius:var(--radius);
    background:#fff;font-family:var(--body);font-size:.95rem;color:var(--ink);
  }
  #searchInput:focus-visible{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber);}
  .no-results{font-family:var(--mono);color:var(--steel);margin-top:2rem;}

  /* ---------- Product grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(255px, 1fr));
    gap:1.5rem;
  }
  .card{
    background:#fff;
    border:1px solid var(--paper-dim);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;flex-direction:column;
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .card:hover{box-shadow:0 10px 24px rgba(30,33,36,.12);transform:translateY(-2px);}
  .card-media{
    aspect-ratio:4/3;width:100%;
    background:var(--charcoal-soft);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .card-media img{width:100%;height:100%;object-fit:cover;}
  .card-media--placeholder .placeholder-icon{width:56%;height:56%;opacity:.9;}
  .card-body{padding:1.1rem 1.15rem 1.3rem;display:flex;flex-direction:column;gap:.6rem;flex:1;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem;}
  .card-name{font-size:1.05rem;line-height:1.25;flex:1;}
  .price-tag{
    font-family:var(--mono);font-weight:700;font-size:.85rem;
    background:var(--paper);color:var(--rust);
    border:1px dashed var(--rust);
    padding:.25rem .55rem;border-radius:3px;
    white-space:nowrap;position:relative;
  }
  .card-desc{font-size:.88rem;color:var(--steel);line-height:1.45;margin:0;flex:1;}
  .btn-order{
    margin-top:.3rem;
    display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
    background:var(--charcoal);color:var(--paper);
    padding:.65rem 1rem;border-radius:var(--radius);
    font-weight:600;font-size:.88rem;
    transition:background .15s ease;
  }
  .btn-order:hover, .btn-order:focus-visible{background:#080a0b;color:var(--amber);}
  .btn-order--disabled{background:var(--paper-dim);color:var(--steel);cursor:not-allowed;}

  /* ---------- About ---------- */
  .about-inner{display:grid;grid-template-columns:1.3fr 1fr;gap:3rem;align-items:center;}
  .about-text{color:var(--paper-dim);font-size:1.02rem;line-height:1.7;max-width:46ch;}
  .about-stats{display:grid;gap:1.4rem;}
  .stat{border-left:3px solid var(--amber);padding-left:1rem;}
  .stat-num{display:block;font-family:var(--display);font-size:2.1rem;color:var(--amber);}
  .stat-label{font-size:.85rem;color:var(--paper-dim);}

  /* ---------- Contact ---------- */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:start;}
  .contact-info{display:flex;flex-direction:column;gap:1.1rem;}
  .contact-row{
    display:flex;flex-direction:column;gap:.15rem;
    border-bottom:1px solid var(--paper-dim);padding-bottom:.9rem;
  }
  .contact-label{font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--steel);}
  .contact-value{font-size:1.05rem;font-weight:600;}
  .contact-value--link{color:var(--rust);}
  .contact-value--link:hover{text-decoration:underline;}
  .map-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--paper-dim);aspect-ratio:4/3;}
  .map-wrap iframe{width:100%;height:100%;border:0;}

  /* ---------- Footer ---------- */
  .footer{
    background:var(--charcoal);color:var(--paper-dim);
    text-align:center;padding:1.6rem 1.5rem;
    font-size:.85rem;
  }

  /* ---------- Floating WhatsApp ---------- */
  .fab-whatsapp{
    position:fixed;right:1.4rem;bottom:1.4rem;z-index:60;
    width:58px;height:58px;border-radius:50%;
    background:#25D366;color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,.28);
    animation:fab-pulse 2.6s ease-in-out infinite;
  }
  .fab-whatsapp:hover{transform:scale(1.06);}
  @keyframes fab-pulse{
    0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.28), 0 0 0 0 rgba(37,211,102,.5);}
    50%{box-shadow:0 6px 18px rgba(0,0,0,.28), 0 0 0 10px rgba(37,211,102,0);}
  }
  @media (prefers-reduced-motion: reduce){
    .fab-whatsapp{animation:none;}
    html{scroll-behavior:auto;}
  }

  /* ---------- Responsive ---------- */
  @media (max-width:860px){
    .about-inner{grid-template-columns:1fr;}
    .contact-grid{grid-template-columns:1fr;}
  }
  @media (max-width:640px){
    .nav{display:none;}
    .header-inner{padding:.75rem 1rem;}
    .btn-header-order span{display:none;}
    .hero{padding:3.5rem 1.25rem 4.5rem;}
    .section{padding:3.5rem 1.25rem;}
    .section-head{flex-direction:column;align-items:stretch;}
    .search-wrap{max-width:none;}
  }
</style>
</body>
</html>
